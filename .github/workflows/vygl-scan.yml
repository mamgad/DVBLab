name: Vygl Security Scan
on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    container:
      image: vygl/vygl-cli:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Vygl scan
        run: vygl scan --fail-on high .
        env:
          VYGL_API_KEY: ${{ secrets.VYGL_API_KEY }}
          VYGL_API_URL: https://api.vygl.io
